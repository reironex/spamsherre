<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShareBoost ▸</title>
  <style>
    :root { --neon: #ff4ecd; --bg: #0d0d12; --panel: #15151f; }
    body { font-family: monospace; background: var(--bg); color: #eee; padding: 20px; text-align: center; }
    .box { max-width: 450px; margin: 20px auto; background: var(--panel); padding: 20px; border-radius: 8px; border: 1px solid rgba(255,78,205,0.2); }
    h1 { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
    input { width: 100%; padding: 10px; margin: 10px 0; background: #1c1c2b; border: 1px solid #333; color: #fff; box-sizing: border-box; outline: none; border-radius: 4px; }
    button { width: 48%; padding: 12px; cursor: pointer; font-weight: bold; border: none; border-radius: 4px; transition: 0.3s; }
    #start { background: var(--neon); color: white; }
    #stop { background: #333; color: #ccc; }
    
    /* Stats Styling */
    .stat-card { text-align: left; background: #0d0d12; padding: 15px; border-left: 4px solid var(--neon); margin-top: 15px; font-size: 13px; position: relative; }
    .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .user-info img { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--neon); }
    .progress { height: 6px; background: #222; margin-top: 10px; border-radius: 10px; overflow: hidden; }
    .bar { height: 100%; background: var(--neon); transition: 0.3s; }
    .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; float: right; }
  </style>
</head>
<body>
  <h1>﹌ ShareBoost ▸</h1>
  <div class="box">
    <input type="text" id="cookie" placeholder="AppState JSON / Cookie">
    <input type="text" id="url" placeholder="Facebook Link">
    <input type="number" id="amount" placeholder="Limit" value="1000">
    <input type="number" id="interval" placeholder="Interval (ms)" value="2000">
    <div style="display:flex; gap:10px;">
      <button id="start" onclick="submit()">EXECUTE</button>
      <button id="stop" onclick="stop()">KILL ALL</button>
    </div>
  </div>

  <div id="status-container" class="box" style="display:none;">
    <div id="stats-list"></div>
  </div>

  <script>
    async function submit() {
      const btn = document.getElementById('start');
      btn.innerText = "STARTING...";
      btn.disabled = true;

      try {
        const res = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            cookie: document.getElementById('cookie').value,
            url: document.getElementById('url').value,
            amount: document.getElementById('amount').value,
            interval: document.getElementById('interval').value
          })
        });
        
        const data = await res.json();
        if(!res.ok) throw new Error(data.error);
        
        document.getElementById('status-container').style.display = 'block';
      } catch (e) {
        alert(e.message);
      } finally {
        btn.innerText = "EXECUTE";
        btn.disabled = false;
      }
    }

    async function stop() { 
      if(confirm("Stop all active boost sessions?")) {
        await fetch('/api/stop', { method: 'POST' }); 
      }
    }

    // Monitoring Loop
    setInterval(async () => {
      try {
        const res = await fetch('/total');
        const data = await res.json();
        
        if(data.length > 0) {
          document.getElementById('status-container').style.display = 'block';
          document.getElementById('stats-list').innerHTML = data.map(item => {
            const percent = (item.count / item.target) * 100;
            const statusColor = item.status === 'failed' ? '#ff4444' : (item.status === 'completed' ? '#00ff88' : '#ff4ecd');
            
            return `
              <div class="stat-card" style="border-color: ${statusColor}">
                <span class="badge" style="background:${statusColor}; color:#000">${item.status.toUpperCase()}</span>
                <div class="user-info">
                  <img src="https://graph.facebook.com/${item.userUID}/picture?type=square" alt="pfp">
                  <div>
                    <b style="color:var(--neon)">${item.userName}</b><br>
                    <small style="color:#777">ID: ${item.userUID}</small>
                  </div>
                </div>
                <div style="margin-top:5px; font-size:11px; color:#aaa">
                  ▸ TARGET POST: ${item.id}<br>
                  ▸ SHARED: ${item.count} / ${item.target}
                </div>
                <div class="progress"><div class="bar" style="width:${percent}%"></div></div>
              </div>
            `;
          }).join('');
        }
      } catch (e) { console.error("Update failed"); }
    }, 1500);
  </script>
</body>
</html>
