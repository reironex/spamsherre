<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShareBoost</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root { --neon: #00ff88; --bg: #080c0a; --panel: #111d16; }
    body { font-family: 'Inter', monospace; background: var(--bg); color: #eee; padding: 20px; text-align: center; margin: 0; }
    
    h1 { color: var(--neon); text-shadow: 0 0 15px var(--neon); letter-spacing: 3px; font-size: 28px; margin: 20px 0 5px; }
    .subtitle { color: #444; font-size: 10px; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 2px; font-weight: bold; }

    .box { max-width: 480px; margin: 0 auto 15px; background: var(--panel); padding: 25px; border-radius: 16px; border: 1px solid rgba(0,255,136,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    input { width: 100%; padding: 12px; margin: 8px 0; background: #050806; border: 1px solid #222; color: #fff; box-sizing: border-box; border-radius: 8px; font-family: monospace; outline: none; transition: 0.3s; }
    input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0,255,136,0.1); }
    
    .btn-group { display: flex; gap: 10px; margin-top: 10px; }
    button { flex: 1; padding: 12px; cursor: pointer; font-weight: 800; border: none; border-radius: 8px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; letter-spacing: 1px; }
    
    #start { background: var(--neon); color: #000; }
    #stop { background: #1a2a22; color: #666; }
    #stop:hover { color: #fff; background: #2b4437; }

    .spinner { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #msg { font-size: 12px; color: #ff4444; margin-bottom: 10px; display: none; font-weight: bold; }

    #status-container { 
      max-width: 480px; 
      margin: 20px auto; 
      max-height: 450px; 
      overflow-y: auto; 
      padding-right: 5px; 
      min-height: 50px; 
    }
    
    #status-container::-webkit-scrollbar { width: 4px; }
    #status-container::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }

    .stat-card { text-align: left; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 12px; position: relative; }

    .session-badge { position: absolute; top: 12px; right: 12px; font-size: 9px; padding: 3px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
    .status-running { background: #2b3300; color: #eaff00; }
    .status-completed { background: #002b16; color: #00ff88; }
    .status-failed { background: #2b0000; color: #ff4444; }

    .del-btn { position: absolute; bottom: 12px; right: 12px; background: #ff4444; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; display: none; }
    .stat-card:hover .del-btn { display: block; }

    .id-info { font-size: 11px; color: #555; margin-bottom: 5px; }
    .count-info { font-size: 18px; font-weight: 800; color: #eee; }
    .progress-bar { height: 4px; background: #000; border-radius: 10px; margin-top: 10px; overflow: hidden; }
    .fill { height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); transition: 0.4s ease-in-out; }

    .tutorial-link { margin-top: 15px; display: block; text-decoration: none; color: var(--neon); font-size: 11px; font-weight: bold; opacity: 0.6; transition: 0.3s; }
    .tutorial-link:hover { opacity: 1; text-shadow: 0 0 5px var(--neon); }
  </style>
</head>
<body>
  <h1>ShareBoost</h1>
  <div class="subtitle">mabilis pa sa relasyon niyo</div>

  <div class="box">
    <div id="msg">⚠ PLEASE FILL ALL FIELDS!</div>
    <input type="text" id="cookie" placeholder="AppState JSON / Cookie">
    <input type="text" id="url" placeholder="Facebook Post Link">
    <input type="number" id="amount" placeholder="Target Limit" value="1000">
    <input type="number" id="interval" placeholder="Delay in ms" value="2000">
    <div class="btn-group">
      <button id="start" onclick="submit()">
        <div class="spinner" id="loader"></div>
        <span id="btnText">START</span>
      </button>
      <button id="stop" onclick="stop()">STOP</button>
    </div>
    <a href="/tutorial.html" class="tutorial-link">
      <i class="fa-solid fa-circle-question"></i> NEED HELP? VIEW TUTORIAL
    </a>
  </div>

  <div id="status-container">
    <div id="stats-list"></div>
  </div>

  <script>
    function showMsg(show) {
      document.getElementById('msg').style.display = show ? 'block' : 'none';
      if(show) setTimeout(() => showMsg(false), 3000);
    }

    async function submit() {
      const cookie = document.getElementById('cookie').value;
      const url = document.getElementById('url').value;
      const amount = document.getElementById('amount').value;
      const interval = document.getElementById('interval').value;

      if(!cookie || !url || !amount || !interval) {
        showMsg(true);
        return;
      }

      const btn = document.getElementById('start');
      const loader = document.getElementById('loader');
      const text = document.getElementById('btnText');
      
      btn.disabled = true; loader.style.display = 'block'; text.innerText = "LAUNCHING...";

      try {
        const res = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cookie, url, amount, interval })
        });
        if(!res.ok) { 
          const err = await res.json(); 
          alert(err.error); 
        }
      } finally {
        btn.disabled = false; loader.style.display = 'none'; text.innerText = "START";
      }
    }

    async function deleteSession(key) {
      await fetch('/api/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key })
      });
    }

    async function stop() { 
      if(confirm("Stop all active turbo sessions?")) {
        await fetch('/api/stop', { method: 'POST' }); 
        location.reload(); 
      }
    }

    setInterval(async () => {
      try {
        const res = await fetch('/total');
        const data = await res.json();
        const list = document.getElementById('stats-list');
        
        if(data && data.length > 0) {
          list.innerHTML = data.map(item => `
            <div class="stat-card">
              <span class="session-badge status-${item.status}">${item.status}</span>
              <div class="id-info">TARGET ID: ${item.id}</div>
              <div class="count-info">${item.count.toLocaleString()} <small style="font-size:10px; color:#444">/ ${item.target.toLocaleString()}</small></div>
              <div class="progress-bar"><div class="fill" style="width:${(item.count/item.target)*100}%"></div></div>
              ${(item.status !== 'running') ? `<button class="del-btn" onclick="deleteSession('${item.key}')">REMOVE ❌</button>` : ''}
            </div>
          `).join('');
        } else {
          list.innerHTML = "";
        }
      } catch (e) {}
    }, 1500);
  </script>
</body>
</html>
