<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShareBoost ▸</title>
  <style>
    :root { --neon: #ff4ecd; --bg: #0d0d12; --panel: #15151f; }
    body { font-family: monospace; background: var(--bg); color: #eee; padding: 20px; text-align: center; }
    .box { max-width: 450px; margin: 20px auto; background: var(--panel); padding: 20px; border-radius: 8px; border: 1px solid rgba(255,78,205,0.2); }
    h1 { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
    input { width: 100%; padding: 10px; margin: 10px 0; background: #1c1c2b; border: 1px solid #333; color: #fff; box-sizing: border-box; outline: none; }
    button { width: 48%; padding: 12px; cursor: pointer; font-weight: bold; border: none; border-radius: 4px; transition: 0.3s; }
    #start { background: var(--neon); color: white; }
    #stop { background: #333; color: #ccc; }
    .stat-card { text-align: left; background: #0d0d12; padding: 15px; border-left: 4px solid var(--neon); margin-top: 10px; font-size: 13px; }
    .progress { height: 6px; background: #222; margin-top: 10px; border-radius: 10px; overflow: hidden; }
    .bar { height: 100%; background: var(--neon); width: 0%; transition: 0.3s; }
  </style>
</head>
<body>
  <h1>﹌ ShareBoost ▸</h1>
  <div class="box">
    <input type="text" id="cookie" placeholder="AppState JSON / Cookie">
    <input type="text" id="url" placeholder="Facebook Link">
    <input type="number" id="amount" placeholder="Limit" value="1000">
    <input type="number" id="interval" placeholder="Interval (ms)" value="2000">
    <div style="display:flex; gap:10px;">
      <button id="start" onclick="submit()">EXECUTE</button>
      <button id="stop" onclick="stopProcess()">KILL</button>
    </div>
  </div>

  <div id="status-container" class="box" style="display:none;">
    <div id="stats-list"></div>
  </div>

  <script>
    let timer = null;
    let count = 0;

    async function submit() {
      const cookieVal = document.getElementById('cookie').value;
      const urlVal = document.getElementById('url').value;
      const target = parseInt(document.getElementById('amount').value);
      const delay = parseInt(document.getElementById('interval').value);

      if(!cookieVal || !urlVal) return alert("Fill all fields!");

      const btn = document.getElementById('start');
      btn.innerText = "INITIALIZING...";
      btn.disabled = true;

      try {
        const initRes = await fetch('/api/share', {
          method: 'POST',
          body: JSON.stringify({ cookie: cookieVal, url: urlVal, mode: 'init' })
        });
        const data = await initRes.json();

        if(!initRes.ok) throw new Error(data.error);

        document.getElementById('status-container').style.display = 'block';
        btn.innerText = "RUNNING...";
        count = 0;

        timer = setInterval(async () => {
          if(count >= target) return stopProcess("COMPLETED");

          try {
            const shareRes = await fetch('/api/share', {
              method: 'POST',
              body: JSON.stringify({ mode: 'share', id: data.id, accessToken: data.accessToken, cookie: data.cookie })
            });

            if(shareRes.ok) {
              count++;
              updateUI(data.id, count, target, "RUNNING");
            } else {
              const errData = await shareRes.json();
              stopProcess("FAILED: " + errData.error);
            }
          } catch (e) {
            stopProcess("FAILED");
          }
        }, delay);

      } catch (e) {
        alert(e.message);
        btn.innerText = "EXECUTE";
        btn.disabled = false;
      }
    }

    function stopProcess(msg = "Stopped") {
      clearInterval(timer);
      const btn = document.getElementById('start');
      btn.innerText = "EXECUTE";
      btn.disabled = false;
      alert(msg);
    }

    function updateUI(id, current, target, status) {
      const percent = (current / target) * 100;
      document.getElementById('stats-list').innerHTML = `
        <div class="stat-card">
          ▸ ID: ${id} [${status}]<br>
          ▸ SHARED: ${current} / ${target}
          <div class="progress"><div class="bar" style="width:${percent}%"></div></div>
        </div>`;
    }
  </script>
</body>
</html>
