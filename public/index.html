<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShareBoost | Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root { --primary: #ff4ecd; --secondary: #a74fff; --dark: #0f0f17; --glass: rgba(255, 255, 255, 0.05); }
    body { font-family: 'Inter', sans-serif; background: var(--dark); color: #eee; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    
    /* Dashboard Layout */
    .dashboard { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 20px; }
    .card { background: rgba(26, 26, 39, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    /* Header */
    .header { text-align: center; padding: 20px 0; }
    .header h1 { color: var(--primary); text-shadow: 0 0 15px var(--primary); margin: 0; font-size: 2rem; }
    .tagline { color: #888; font-size: 0.9rem; margin-top: 5px; }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .stat-box { background: var(--glass); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
    .stat-box i { color: var(--primary); display: block; margin-bottom: 5px; }
    .stat-val { font-size: 1.2rem; font-weight: bold; }

    /* Forms */
    .form-group { margin-bottom: 15px; }
    label { font-size: 0.8rem; color: var(--primary); text-transform: uppercase; font-weight: bold; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; box-sizing: border-box; }
    input:focus { border-color: var(--primary); outline: none; }
    
    /* Buttons */
    .btn-group { display: flex; gap: 10px; margin-top: 10px; }
    button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-start { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
    .btn-stop { background: #333; color: white; }
    button:hover { transform: translateY(-2px); filter: brightness(1.2); }

    /* Progress Items */
    .process-item { background: var(--glass); padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 0.85rem; }
    .progress-bg { height: 6px; background: #222; border-radius: 3px; margin-top: 8px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); transition: width 0.5s; }

    /* Admin Floating */
    #admin-panel { position: fixed; top: 20px; left: 20px; z-index: 100; }
    #admin-panel button { width: 40px; height: 40px; border-radius: 50%; padding: 0; }

    .hidden { display: none; }
    #announcement-bar { background: var(--primary); color: white; padding: 10px; width: 100%; text-align: center; position: fixed; top: 0; display: none; font-weight: bold; z-index: 1000; }
  </style>
</head>
<body>

  <div id="announcement-bar"></div>

  <div id="admin-panel">
    <button class="btn-stop" onclick="toggleAdmin()"><i class="fa-solid fa-lock"></i></button>
  </div>

  <div class="dashboard">
    <div class="header">
      <h1><i class="fa-solid fa-bolt"></i> ShareBoost</h1>
      <div class="tagline">Facebook Automated Sharing Tool</div>
    </div>

    <div id="auth-card" class="card">
      <div class="form-group">
        <label><i class="fa-solid fa-user"></i> Username</label>
        <input type="text" id="user" placeholder="Enter username">
      </div>
      <div class="form-group">
        <label><i class="fa-solid fa-key"></i> Password</label>
        <input type="password" id="pass" placeholder="Enter password">
      </div>
      <div class="btn-group">
        <button class="btn-start" onclick="handleAuth('login')">Login</button>
        <button class="btn-stop" onclick="handleAuth('signup')">Sign Up</button>
      </div>
    </div>

    <div id="main-card" class="card hidden">
      <div class="form-group">
        <label><i class="fa-solid fa-cookie"></i> AppState / Cookie</label>
        <input type="text" id="cookie" placeholder="Paste AppState JSON or Cookie string">
      </div>
      <div class="form-group">
        <label><i class="fa-solid fa-link"></i> Post Link</label>
        <input type="text" id="url" placeholder="https://www.facebook.com/...">
      </div>
      <div style="display: flex; gap: 10px;">
        <div class="form-group" style="flex: 1;">
          <label>Limit</label>
          <input type="number" id="amount" value="100">
        </div>
        <div class="form-group" style="flex: 1;">
          <label>Delay (s)</label>
          <input type="number" id="interval" value="2">
        </div>
      </div>
      <div class="btn-group">
        <button class="btn-start" id="startBtn" onclick="startBoost()">Start Boost</button>
        <button class="btn-stop" onclick="stopBoost()">Stop All</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-box">
        <i class="fa-solid fa-users"></i>
        <div class="stat-val" id="userCount">0</div>
        <div style="font-size: 0.7rem; color: #888;">Active Users</div>
      </div>
      <div class="stat-box">
        <i class="fa-solid fa-share-nodes"></i>
        <div class="stat-val" id="shareCount">0</div>
        <div style="font-size: 0.7rem; color: #888;">Boosts Done</div>
      </div>
    </div>

    <div id="active-card" class="card hidden">
      <label><i class="fa-solid fa-spinner fa-spin"></i> Active Sessions</label>
      <div id="session-list"></div>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    // Auth Logic
    function handleAuth(type) {
      const u = $('user').value, p = $('pass').value;
      if(!u || !p) return alert("Fields required");
      
      let users = JSON.parse(localStorage.getItem('users') || '{}');
      if(type === 'signup') {
        users[u] = p;
        localStorage.setItem('users', JSON.stringify(users));
        alert("Account created!");
      } else {
        if(users[u] === p) {
          $('auth-card').classList.add('hidden');
          $('main-card').classList.remove('hidden');
        } else alert("Invalid login");
      }
    }

    // Boost Logic
    async function startBoost() {
      const startBtn = $('startBtn');
      startBtn.disabled = true;
      startBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Starting...';

      const body = {
        cookie: $('cookie').value,
        url: $('url').value,
        amount: $('amount').value,
        interval: $('interval').value
      };

      try {
        const res = await fetch('/api/submit', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if(data.status === 200) alert("Boost session started!");
        else alert("Error: " + data.error);
      } catch (e) { alert("Failed to connect"); }
      
      startBtn.disabled = false;
      startBtn.innerHTML = 'Start Boost';
    }

    async function stopBoost() {
      await fetch('/api/stop', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: '{}' });
      alert("All sessions stopped");
    }

    // Refresh Stats & Sessions
    async function updateDashboard() {
      try {
        const resTotal = await fetch('/total');
        const activeSessions = await resTotal.json();
        
        const resShares = await fetch('/shares');
        const allShares = await resShares.json();

        $('shareCount').textContent = allShares.length;

        const list = $('session-list');
        list.innerHTML = '';
        if(activeSessions.length > 0) {
          $('active-card').classList.remove('hidden');
          activeSessions.forEach(s => {
            const perc = (s.count / s.target) * 100;
            list.innerHTML += `
              <div class="process-item">
                <div style="display:flex; justify-content:space-between">
                  <span>ID: ${s.id}</span>
                  <span>${s.count}/${s.target}</span>
                </div>
                <div class="progress-bg">
                  <div class="progress-fill" style="width: ${perc}%"></div>
                </div>
              </div>
            `;
          });
        } else {
          $('active-card').classList.add('hidden');
        }
      } catch (e) {}
    }

    setInterval(updateDashboard, 2000);
    updateDashboard();

    // Announcement
    async function checkAnn() {
      const res = await fetch('/api/announcement');
      const data = await res.json();
      if(data.message) {
        $('announcement-bar').textContent = "📢 " + data.message;
        $('announcement-bar').style.display = 'block';
      }
    }
    checkAnn();
  </script>
</body>
</html>
