<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShareBoost Premium ▸</title>
  <style>
    :root { --neon: #ff4ecd; --bg: #08080c; --panel: #11111d; }
    body { font-family: 'Inter', monospace; background: var(--bg); color: #eee; padding: 20px; text-align: center; margin: 0; overflow-x: hidden; }
    
    h1 { color: var(--neon); text-shadow: 0 0 20px var(--neon); letter-spacing: 3px; font-size: 28px; margin: 20px 0 5px; }
    .subtitle { color: #555; font-size: 10px; text-transform: uppercase; margin-bottom: 20px; }

    .box { max-width: 480px; margin: 0 auto 15px; background: var(--panel); padding: 25px; border-radius: 16px; border: 1px solid rgba(255,78,205,0.1); }
    
    input { width: 100%; padding: 12px; margin: 8px 0; background: #050508; border: 1px solid #222; color: #fff; box-sizing: border-box; border-radius: 8px; font-family: monospace; outline: none; }
    input:focus { border-color: var(--neon); }
    
    .btn-group { display: flex; gap: 10px; margin-top: 10px; }
    button { flex: 1; padding: 12px; cursor: pointer; font-weight: 800; border: none; border-radius: 8px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    
    #start { background: var(--neon); color: white; }
    #stop { background: #1a1a2a; color: #888; }

    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollable Container */
    #status-container { 
      max-width: 480px; margin: 0 auto; 
      max-height: 400px; /* Limit ang taas */
      overflow-y: auto; /* Magkakaroon ng sariling scroll */
      padding-right: 5px;
      scrollbar-width: thin;
      scrollbar-color: var(--neon) #111;
    }
    #status-container::-webkit-scrollbar { width: 4px; }
    #status-container::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }

    .stat-card { text-align: left; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 12px; position: relative; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .session-badge { position: absolute; top: 12px; right: 12px; font-size: 9px; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
    .status-running { background: #332b00; color: #ffea00; }
    .status-completed { background: #002b16; color: #00ff88; }
    .status-failed { background: #2b0000; color: #ff4444; }

    /* Individual Delete Button */
    .del-btn { position: absolute; bottom: 12px; right: 12px; background: #ff4444; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; display: none; }
    .stat-card:hover .del-btn { display: block; }

    .id-info { font-size: 13px; color: #777; margin-bottom: 5px; }
    .count-info { font-size: 18px; font-weight: 800; }
    .progress-bar { height: 4px; background: #000; border-radius: 10px; margin-top: 10px; overflow: hidden; }
    .fill { height: 100%; background: var(--neon); transition: 0.5s; }
  </style>
</head>
<body>
  <h1>﹌ ShareBoost ▸</h1>
  <div class="subtitle">Individual Logs & Auto-Scroll</div>

  <div class="box">
    <input type="text" id="cookie" placeholder="AppState JSON / Cookie">
    <input type="text" id="url" placeholder="Target Post Link">
    <input type="number" id="amount" placeholder="Limit" value="1000">
    <input type="number" id="interval" placeholder="Delay (ms)" value="2000">
    <div class="btn-group">
      <button id="start" onclick="submit()">
        <div class="spinner" id="loader"></div>
        <span id="btnText">EXECUTE</span>
      </button>
      <button id="stop" onclick="stop()">KILL ALL</button>
    </div>
  </div>

  <div id="status-container">
    <div id="stats-list"></div>
  </div>

  <script>
    async function submit() {
      const btn = document.getElementById('start');
      const loader = document.getElementById('loader');
      const text = document.getElementById('btnText');
      btn.disabled = true; loader.style.display = 'block'; text.innerText = "STARTING...";

      try {
        await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            cookie: document.getElementById('cookie').value,
            url: document.getElementById('url').value,
            amount: document.getElementById('amount').value,
            interval: document.getElementById('interval').value
          })
        });
      } finally {
        btn.disabled = false; loader.style.display = 'none'; text.innerText = "EXECUTE";
      }
    }

    async function deleteSession(key) {
      await fetch('/api/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key })
      });
    }

    async function stop() { 
      await fetch('/api/stop', { method: 'POST' }); 
      location.reload(); 
    }

    setInterval(async () => {
      try {
        const res = await fetch('/total');
        const data = await res.json();
        if(data.length > 0) {
          document.getElementById('stats-list').innerHTML = data.map(item => `
            <div class="stat-card">
              <span class="session-badge status-${item.status}">${item.status}</span>
              <div class="id-info">Post ID: ${item.id}</div>
              <div class="count-info">${item.count.toLocaleString()} <small style="font-size:10px; color:#555">/ ${item.target.toLocaleString()}</small></div>
              <div class="progress-bar"><div class="fill" style="width:${(item.count/item.target)*100}%"></div></div>
              ${(item.status !== 'running') ? `<button class="del-btn" onclick="deleteSession('${item.key}')">REMOVE ❌</button>` : ''}
            </div>
          `).join('');
        }
      } catch (e) {}
    }, 1500);
  </script>
</body>
</html>
