<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEITO | CORE DASHBOARD</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --bg: #050505; --panel: #0f0f0f; --border: #1f1f1f; }
    body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
    .main-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; max-width: 1200px; margin: 0 auto; }
    .panel { background: var(--panel); border: 2px solid var(--border); padding: 20px; position: relative; }
    .panel::before { content: ""; position: absolute; top: -2px; left: -2px; width: 20px; height: 20px; border-top: 2px solid var(--neon-cyan); border-left: 2px solid var(--neon-cyan); }
    h1 { font-size: 1.5rem; color: var(--neon-cyan); text-transform: uppercase; letter-spacing: 3px; }
    .input-box { margin-bottom: 20px; }
    label { display: block; font-size: 10px; color: #666; margin-bottom: 5px; text-transform: uppercase; }
    input, select { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: var(--neon-cyan); font-family: inherit; box-sizing: border-box; }
    .btn-fire { width: 100%; padding: 15px; background: var(--neon-cyan); color: #000; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
    .log-item { font-size: 12px; border-bottom: 1px solid #1a1a1a; padding: 10px 0; color: #aaa; }
    .stat-val { color: var(--neon-purple); font-size: 20px; font-weight: bold; }
    @media (max-width: 800px) { .main-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="main-grid">
  <div class="panel">
    <h1><i class="fa-solid fa-terminal"></i> Core_Command</h1>
    <div class="input-box">
      <label>Access_Token / AppState</label>
      <input type="text" id="cookie" placeholder="Paste AppState JSON or Cookie string">
    </div>
    <div class="input-box">
      <label>Target_URL</label>
      <input type="text" id="url" placeholder="https://www.facebook.com/...">
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
      <div class="input-box">
        <label>Limit</label>
        <input type="number" id="amount" value="1000">
      </div>
      <div class="input-box">
        <label>Speed_Preset</label>
        <select id="speed-select">
          <option value="1">1 Share / 1 sec</option>
          <option value="2">1 Share / 2 sec</option>
          <option value="turbo">🔥 TURBO: 100/sec</option>
        </select>
      </div>
    </div>
    <button class="btn-fire" id="execBtn" onclick="launch()">Execute Boost</button>
  </div>

  <div class="panel">
    <h1>Dashboard</h1>
    <div style="margin-top: 30px;">
      <label>Total_Requests_Sent</label>
      <div class="stat-val" id="totalShares">0</div>
    </div>
    <div style="margin-top: 20px;">
      <label>Active_Processes</label>
      <div id="process-list" style="margin-top:10px;"></div>
    </div>
    <button class="btn-fire" style="background:#ff4e4e; margin-top:20px;" onclick="stopAll()">Stop All</button>
  </div>
</div>

<script>
  async function launch() {
    const btn = document.getElementById('execBtn');
    const speed = document.getElementById('speed-select').value;
    const body = {
      cookie: document.getElementById('cookie').value,
      url: document.getElementById('url').value,
      amount: document.getElementById('amount').value,
      interval: speed === 'turbo' ? 1 : parseInt(speed),
      isTurbo: speed === 'turbo'
    };

    btn.disabled = true;
    btn.textContent = "Processing...";

    try {
      const res = await fetch('/api/submit', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if(res.ok) alert("Success: Boost Started!");
      else alert("Error: " + data.error);
    } catch(e) {
      alert("System Error: Check Connection");
    } finally {
      btn.disabled = false;
      btn.textContent = "Execute Boost";
    }
  }

  async function stopAll() {
    await fetch('/api/stop', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: '{}' });
    alert("All processes stopped.");
  }

  async function updateStats() {
    try {
      const resTotal = await fetch('/total');
      const active = await resTotal.json();
      const list = document.getElementById('process-list');
      list.innerHTML = active.length ? '' : '<div style="font-size:10px; color:#333;">NO_ACTIVE_STREAM</div>';
      active.forEach(s => {
        list.innerHTML += `<div class="log-item"><span style="color:var(--neon-cyan)">[PROC_${s.session}]</span> ${s.count}/${s.target} shares</div>`;
      });

      const resShares = await fetch('/shares');
      const all = await resShares.json();
      document.getElementById('totalShares').textContent = all.length;
    } catch(e) {}
  }
  setInterval(updateStats, 2000);
</script>
</body>
</html>
