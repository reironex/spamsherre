<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShareBoost ▸</title>
  <style>
    :root { --neon: #ff4ecd; --bg: #0d0d12; --panel: #15151f; }
    body { font-family: monospace; background: var(--bg); color: #eee; margin: 0; padding: 20px; }
    
    .container { max-width: 500px; margin: 0 auto; }
    h1 { color: var(--neon); letter-spacing: 2px; text-align: center; }
    
    .box { background: var(--panel); border: 1px solid rgba(255, 78, 205, 0.2); padding: 20px; border-radius: 4px; }
    .label { color: var(--neon); font-size: 12px; margin-bottom: 8px; display: block; }
    
    input { 
      width: 100%; background: #1c1c2b; border: none; border-bottom: 2px solid #2a2a3d; 
      color: #fff; padding: 10px; box-sizing: border-box; margin-bottom: 15px; outline: none;
    }
    input:focus { border-bottom: 2px solid var(--neon); }

    .btns { display: flex; gap: 10px; }
    button { 
      flex: 1; padding: 12px; border: none; cursor: pointer; font-weight: bold; 
      transition: 0.3s; color: white; border-radius: 2px;
    }
    #start { background: var(--neon); }
    #stop { background: #2a2a3d; }
    button:hover { opacity: 0.8; }

    #status-box { margin-top: 20px; display: none; }
    .stat-item { background: #0d0d12; padding: 10px; border-left: 3px solid var(--neon); font-size: 13px; }
    .progress { height: 4px; background: var(--neon); transition: 0.4s; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>﹌ ShareBoost ▸</h1>
    
    <div class="box">
      <span class="label">▸ APPSTATE / COOKIE</span>
      <input type="text" id="cookie" placeholder="Paste AppState JSON">
      
      <span class="label">▸ TARGET URL</span>
      <input type="text" id="url" placeholder="Facebook Post Link">
      
      <div class="btns">
        <button id="start">EXECUTE</button>
        <button id="stop">KILL</button>
      </div>
    </div>

    <div id="status-box" class="box">
      <div id="stats-list"></div>
    </div>
  </div>

  <script>
    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');
    const statusBox = document.getElementById('status-box');

    startBtn.onclick = async () => {
      startBtn.innerHTML = "RUNNING...";
      const res = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          cookie: document.getElementById('cookie').value,
          url: document.getElementById('url').value,
          amount: 50000 
        })
      });
      if(res.ok) statusBox.style.display = 'block';
      startBtn.innerHTML = "EXECUTE";
    };

    stopBtn.onclick = () => fetch('/api/stop', { method: 'POST' });

    setInterval(async () => {
      const res = await fetch('/total');
      const data = await res.json();
      if(data.length > 0) {
        statusBox.style.display = 'block';
        document.getElementById('stats-list').innerHTML = data.map(s => `
          <div class="stat-item">
            ▸ ID: ${s.id}<br>
            ▸ SHARES: ${s.count} / ${s.target}
            <div style="background:#222; width:100%;"><div class="progress" style="width:${(s.count/s.target)*100}%"></div></div>
          </div>
        `).join('');
      }
    }, 1000);
  </script>
</body>
</html>
